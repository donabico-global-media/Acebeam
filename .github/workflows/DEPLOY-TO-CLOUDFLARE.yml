name: DEPLOY-TO-CLOUDFLARE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy-edge:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Source Code Matrix
        uses: actions/checkout@v4

      - name: 2. Đẩy dữ liệu trực tiếp lên Edge CDN Cloudflare
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          directory: "." 
          projectName: "acebeam" # Sửa thành "acebeam" thay vì "acebeam-affiliate"
