name: DEPLOY-CLOUDFLARE-INTERNET

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write      
  id-token: write   

concurrency:
  group: "cloudflare-internet-symbiosis"
  cancel-in-progress: true

jobs:
  # LUỒNG 1: ĐẨY LÊN GITHUB PAGES TĨNH & XUẤT FILE TRẠNG THÁI
  deploy-github-pages:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code Matrix
        uses: actions/checkout@v4

      - name: 2. Tự động sinh Log Internet-Bridge.json
        run: |
          CURRENT_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          cat <<EOF > Internet-Bridge.json
          {
            "status": "Online",
            "protocol": "INTERNET-EDGE-BRIDGE",
            "system_activity_indicator": "green",
            "last_deploy_utc": "$CURRENT_TIME",
            "repository": "${{ github.repository }}"
          }
          EOF

      - name: 3. Kích hoạt cấu hình Pages bản địa
        uses: actions/configure-pages@v5

      - name: 4. Đóng gói và phát tán ra Internet-Vệ tinh
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' 

      - name: 5. Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # LUỒNG 2: TỰ ĐỘNG TẠO VÀ ĐẨY LÊN EDGE CLOUDFLARE (KHÔNG CẦN TẠO TRƯỚC)
  deploy-cloudflare-pages:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Code Matrix
        uses: actions/checkout@v4

      - name: 2. Cài đặt môi trường Node.js bản mới nhất
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 3. Sử dụng Wrangler CLI để tự động tạo Project và Deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Tự động lấy tên kho GitHub hiện tại làm tên dự án (Ví dụ: acebeam, 8000kicks...)
          REPO_NAME="${{ github.event.repository.name }}"
          echo "Bắt đầu quét hạ tầng Cloudflare cho dự án: $REPO_NAME"
          
          # Lệnh tổng lực: Tự động deploy, nếu chưa có project -> TỰ ĐỘNG TẠO MỚI TINH!
          npx wrangler pages deploy . --project-name="$REPO_NAME" --branch="main"
