name: 🌊 INTERNET CONNECT AUTO

on:
  workflow_dispatch:
  push:
    paths:
      - 'Internet-Connect-Auto/**'

jobs:
  autonomous-ocean-pulse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Launch system
        run: |
          if [ -f "Internet-Connect-Auto/Internet-Connect-Auto.py" ]; then
            python "Internet-Connect-Auto/Internet-Connect-Auto.py"
          else
            echo "[ERROR] File không tồn tại!"
            exit 1
          fi
